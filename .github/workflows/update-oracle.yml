name: Update HuntOracle Threat Level

# Runs every 15 minutes. HuntOracle.update_threat() fetches live Bradbury
# congestion data via gl.get_webpage(); all 5 validators reach consensus before
# state mutates — so this job just fires the TX and exits. Consensus happens
# on-chain in the following 1–5 minutes.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  update-oracle:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Env vars are injected directly — do NOT use --env-file=.env here
      # (that flag reads a local file; there is no .env in CI).
      # The script's requireEnv() reads process.env, so this is sufficient.
      - name: Call HuntOracle.update_threat()
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          VITE_HUNT_ORACLE_ADDRESS: ${{ secrets.VITE_HUNT_ORACLE_ADDRESS }}
        run: node scripts/update_oracle.mjs
